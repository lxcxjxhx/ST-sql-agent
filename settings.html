<div class="mvu-panel">
    <h3>MVU-SQLite Memory Settings</h3>
    
    <div class="mvu-status">
        <div id="mvu-status-indicator" class="mvu-status-indicator"></div>
        <span id="mvu-status-text">Initializing...</span>
    </div>
    
    <div class="form-group">
        <label>Character ID:</label>
        <input type="text" id="mvu-character-id" class="mvu-input" value="default" placeholder="Character ID">
    </div>
    
    <div class="form-group">
        <label>Variable Operations:</label>
        <input type="text" id="mvu-var-key" class="mvu-input" placeholder="Variable name">
        <input type="text" id="mvu-var-value" class="mvu-input" placeholder="Variable value">
        <button id="mvu-set-var" class="mvu-btn">Set Variable</button>
        <button id="mvu-get-var" class="mvu-btn">Get Variable</button>
        <button id="mvu-get-all" class="mvu-btn">Get All</button>
    </div>
    
    <div class="form-group">
        <label>Memory Search:</label>
        <input type="text" id="mvu-search" class="mvu-input" placeholder="Search memory...">
        <button id="mvu-search-btn" class="mvu-btn">Search</button>
    </div>
    
    <div class="form-group">
        <label>Store Memory:</label>
        <input type="text" id="mvu-memory-content" class="mvu-input" placeholder="Memory content">
        <input type="text" id="mvu-memory-tag" class="mvu-input" placeholder="Tag (optional)">
        <button id="mvu-store-memory" class="mvu-btn">Store</button>
    </div>
    
    <div class="form-group">
        <label>Snapshots:</label>
        <input type="text" id="mvu-snapshot-name" class="mvu-input" placeholder="Snapshot name">
        <input type="text" id="mvu-snapshot-desc" class="mvu-input" placeholder="Description (optional)">
        <button id="mvu-create-snapshot" class="mvu-btn">Create Snapshot</button>
        <button id="mvu-list-snapshots" class="mvu-btn">List Snapshots</button>
    </div>
    
    <div id="mvu-result" class="mvu-result" style="display: none;"></div>
    
    <div id="mvu-memory-list" class="mvu-memory-list"></div>
    <div id="mvu-variable-list" class="mvu-memory-list"></div>
</div>
